<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    color:#333;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    transition:.3s;
}

.dark{
    background:#121212;
    color:#fff;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

.dark .container{
    background:#1f1f1f;
}

h1,h2,h3{
    text-align:center;
    margin-bottom:15px;
}

select,input,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    cursor:pointer;
    background:#3498db;
    color:white;
    border:none;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

#themeBtn{
    background:#2c3e50;
}

.hide{
    display:none;
}

.progress-container{
    width:100%;
    height:12px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin:15px 0;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#27ae60;
    transition:.3s;
}

.option{
    display:block;
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#3498db;
    color:white;
    cursor:pointer;
}

.option:hover{
    opacity:.9;
}

.correct{
    background:green !important;
}

.wrong{
    background:red !important;
}

.info{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    font-weight:bold;
}

#leaderboard p{
    padding:5px;
    border-bottom:1px solid #ccc;
}

@media(max-width:600px){
    .info{
        flex-direction:column;
        gap:8px;
    }
}
</style>
</head>

    <option value="DataStructures">DataStructures</option>
    <option value="ArtificialIntelligence">ArtificialIntelligence</option>
    <option value="ComputerFundamentals">ComputerFundamentals</option>
    <option value="GeneralKnowledge">General Knowledge</option>
</select>

<select id="difficulty">
<option value="Easy">Easy</option>
<option value="Medium">Medium</option>
<option value="Hard">Hard</option>
</select>

<button onclick="startQuiz()">Start Quiz</button>

<h3>Leaderboard</h3>
<div id="leaderboard"></div>

</div>

<div id="quizScreen" class="hide">

<div class="info">
<span id="questionCount"></span>
<span id="timer">Time: 15s</span>
<span id="scoreText">Score: 0</span>
</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<h2 id="question"></h2>

<div id="answers"></div>

<button id="nextBtn" class="hide">Next Question</button>

</div>

<div id="resultScreen" class="hide">
<h2>Quiz Completed 🎉</h2>
<h3 id="finalScore"></h3>

<button onclick="location.reload()">Play Again</button>
</div>

let questions=[];
let currentQuestion=0;
let score=0;
let timeLeft=15;
let timer;

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

function playSound(freq){
    const audioContext=
    new(window.AudioContext||
    window.webkitAudioContext)();

    const oscillator=
    audioContext.createOscillator();

    oscillator.type="sine";
    oscillator.frequency.value=freq;

    oscillator.connect(audioContext.destination);

    oscillator.start();

    setTimeout(()=>{
        oscillator.stop();
    },120);
}

function startQuiz(){

const category=
document.getElementById("category").value;

const difficulty=
document.getElementById("difficulty").value;

questions=
quizData[category]
.filter(q=>q.difficulty===difficulty);

if(questions.length===0){
alert("No questions found");
return;
}

shuffle(questions);

currentQuestion=0;
score=0;

document
.getElementById("startScreen")
.classList.add("hide");

document
.getElementById("quizScreen")
.classList.remove("hide");

showQuestion();
}

function showQuestion(){

clearInterval(timer);

const q=questions[currentQuestion];

document.getElementById("question")
.textContent=q.question;

document.getElementById("questionCount")
.textContent=
`Question ${currentQuestion+1}/${questions.length}`;

document.getElementById("scoreText")
.textContent=`Score: ${score}`;

document.getElementById("nextBtn")
.classList.add("hide");

const answers=
document.getElementById("answers");

answers.innerHTML="";

shuffle(q.options);

q.options.forEach(option=>{

const btn=
document.createElement("button");

btn.className="option";
btn.textContent=option;

btn.onclick=()=>selectAnswer(btn,q.answer);

answers.appendChild(btn);

});

updateProgress();
startTimer();
}

function selectAnswer(button,correctAnswer){

clearInterval(timer);

const buttons=
document.querySelectorAll(".option");

buttons.forEach(btn=>{

btn.disabled=true;

if(btn.textContent===correctAnswer){
btn.classList.add("correct");
}

});

if(button.textContent===correctAnswer){

score++;

playSound(800);

document.getElementById("scoreText")
.textContent=`Score: ${score}`;

}else{

button.classList.add("wrong");

playSound(250);
}

document
.getElementById("nextBtn")
.classList.remove("hide");
}

function startTimer(){

timeLeft=15;

document.getElementById("timer")
.textContent=`Time: ${timeLeft}s`;

timer=setInterval(()=>{

timeLeft--;

document.getElementById("timer")
.textContent=`Time: ${timeLeft}s`;

if(timeLeft<=0){

clearInterval(timer);

document
.getElementById("nextBtn")
.classList.remove("hide");

const buttons=
document.querySelectorAll(".option");

buttons.forEach(btn=>{

btn.disabled=true;

if(btn.textContent===
questions[currentQuestion].answer){
btn.classList.add("correct");
}

});

}

},1000);

}

document
.getElementById("nextBtn")
.addEventListener("click",()=>{

currentQuestion++;

if(currentQuestion<questions.length){

showQuestion();

}else{

finishQuiz();

}

});

function updateProgress(){

const progress=
((currentQuestion+1)/
questions.length)*100;

document
.getElementById("progressBar")
.style.width=
progress+"%";

}

function finishQuiz(){

document
.getElementById("quizScreen")
.classList.add("hide");

document
.getElementById("resultScreen")
.classList.remove("hide");

document
.getElementById("finalScore")
.textContent=
`You scored ${score} out of ${questions.length}`;

saveLeaderboard();
displayLeaderboard();
}

function saveLeaderboard(){

const player=
document.getElementById("playerName")
.value || "Anonymous";

let leaderboard=
JSON.parse(
localStorage.getItem("leaderboard")
)||[];

leaderboard.push({
name:player,
score:score
});

leaderboard.sort(
(a,b)=>b.score-a.score
);

leaderboard=
leaderboard.slice(0,10);

localStorage.setItem(
"leaderboard",
JSON.stringify(leaderboard)
);
}

function displayLeaderboard(){

let leaderboard=
JSON.parse(
localStorage.getItem("leaderboard")
)||[];

let html="";

leaderboard.forEach((player,index)=>{

html+=`
<p>
${index+1}. ${player.name}
- ${player.score}
</p>
`;

});

document
.getElementById("leaderboard")
.innerHTML=html;
}

displayLeaderboard();

const themeBtn=
document.getElementById("themeBtn");

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}

themeBtn.addEventListener("click",()=>{

document.body.classList.toggle("dark");

localStorage.setItem(
"theme",
document.body.classList.contains("dark")
?"dark":"light"
);

});

</script>
